<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero SLA - Logística</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --verde:#1ea97c;
    --verde-claro:#d7f3e6;
    --amarillo:#f2c14e;
    --amarillo-claro:#fdf1d3;
    --rojo:#e25555;
    --rojo-claro:#fbe1e1;
    --azul:#2c3e50;
    --gris-fondo:#f4f6f8;
    --borde:#e2e6ea;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:var(--gris-fondo);
    color:#1c1c1c;
  }
  header{
    background:var(--azul);
    color:#fff;
    padding:18px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  header h1{margin:0;font-size:20px;}
  header span{font-size:13px;opacity:.8;}
  .container{
    max-width:1200px;
    margin:0 auto;
    padding:20px;
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:20px;
  }
  @media (max-width: 900px){
    .container{grid-template-columns:1fr;}
  }
  .card{
    background:#fff;
    border:1px solid var(--borde);
    border-radius:10px;
    padding:16px;
    margin-bottom:20px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .card h2{
    margin:0 0 12px;
    font-size:15px;
    color:var(--azul);
  }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  th,td{
    padding:8px 10px;
    text-align:center;
    border-bottom:1px solid var(--borde);
  }
  th{
    background:#f0f2f5;
    color:var(--azul);
    font-weight:600;
  }
  td:first-child, th:first-child{text-align:left;}
  .pill{
    display:inline-block;
    padding:3px 8px;
    border-radius:6px;
    font-weight:600;
    min-width:46px;
  }
  .ok{background:var(--verde-claro); color:#0d6b4d;}
  .warn{background:var(--amarillo-claro); color:#8a6500;}
  .bad{background:var(--rojo-claro); color:#a31d1d;}

  .chat-card{display:flex;flex-direction:column;height:560px;}
  .chat-messages{
    flex:1;
    overflow-y:auto;
    padding:8px 4px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .msg{
    max-width:85%;
    padding:10px 12px;
    border-radius:10px;
    font-size:14px;
    line-height:1.4;
  }
  .msg.bot{
    background:#eef2f5;
    align-self:flex-start;
    border:1px solid var(--borde);
  }
  .msg.user{
    background:var(--verde);
    color:#fff;
    align-self:flex-end;
  }
  .chat-input{
    display:flex;
    gap:8px;
    margin-top:10px;
  }
  .chat-input input{
    flex:1;
    padding:10px 12px;
    border:1px solid var(--borde);
    border-radius:8px;
    font-size:14px;
  }
  .chat-input button{
    background:var(--azul);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:0 18px;
    cursor:pointer;
    font-weight:600;
  }
  .chat-input button:hover{opacity:.9;}
  .typing{
    font-size:12px;
    color:#888;
    font-style:italic;
    padding-left:4px;
  }
</style>
</head>
<body>

<header>
  <h1>📦 Tablero de SLA - Logística</h1>
  <span id="last-update">Datos de ejemplo</span>
</header>

<div class="container">

  <div>
    <div class="card">
      <h2>#Shipment & SLA por fecha de vencimiento</h2>
      <canvas id="chartMensual" height="160"></canvas>
    </div>

    <div class="card">
      <h2>SLA por Provincia</h2>
      <table id="tablaProvincia">
        <thead>
          <tr>
            <th>Provincia</th><th>Share</th><th>SLA</th><th>+24h</th><th>+48h</th><th>+72h</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="card chat-card">
    <h2>💬 Preguntale al reporte</h2>
    <div class="chat-messages" id="chatMessages">
      <div class="msg bot">¡Hola! Preguntame sobre el cumplimiento de SLA, por provincia, marca o mes. Ej: "¿Cuál es el % de SLA de Buenos Aires?"</div>
    </div>
    <div class="chat-input">
      <input type="text" id="chatInput" placeholder="Escribí tu pregunta..." />
      <button onclick="enviarMensaje()">Enviar</button>
    </div>
  </div>

</div>

<script>
const dataMensual = {
  labels: ["enero","febrero","marzo","abril","mayo","junio"],
  shipments: [400, 1100, 3200, 1800, 2100, 2500],
  sla: [0, 36.7, 21.7, 36.8, 64.9, 76.3]
};

const dataProvincia = [
  {provincia:"Capital Federal", share:"78,28%", sla:44.8, h24:74.8, h48:79.5, h72:83.6},
  {provincia:"Buenos Aires", share:"16,10%", sla:44.7, h24:71.3, h48:80.6, h72:88.0},
  {provincia:"Chubut", share:"3,90%", sla:90.4, h24:97.1, h48:95.7, h72:97.9},
  {provincia:"Santa Fe", share:"0,44%", sla:89.5, h24:95.7, h48:95.7, h72:97.9},
  {provincia:"Salta", share:"0,16%", sla:94.1, h24:94.1, h48:94.1, h72:94.1},
];

function colorSLA(valor){
  if(valor >= 90) return {bg:"ok"};
  if(valor >= 60) return {bg:"warn"};
  return {bg:"bad"};
}

try{
  const tbody = document.querySelector("#tablaProvincia tbody");
  dataProvincia.forEach(row=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.provincia}</td>
      <td>${row.share}</td>
      <td><span class="pill ${colorSLA(row.sla).bg}">${row.sla.toFixed(1)}%</span></td>
      <td><span class="pill ${colorSLA(row.h24).bg}">${row.h24.toFixed(1)}%</span></td>
      <td><span class="pill ${colorSLA(row.h48).bg}">${row.h48.toFixed(1)}%</span></td>
      <td><span class="pill ${colorSLA(row.h72).bg}">${row.h72.toFixed(1)}%</span></td>
    `;
    tbody.appendChild(tr);
  });
}catch(e){
  console.error("Error renderizando tabla:", e);
}

try{
  if(typeof Chart === "undefined"){
    throw new Error("Chart.js no se cargó");
  }
  const ctx = document.getElementById('chartMensual').getContext('2d');
  new Chart(ctx, {
    data: {
      labels: dataMensual.labels,
      datasets: [
        { type:'bar', label:'#Shipment', data: dataMensual.shipments, backgroundColor: '#1ea97c', yAxisID:'y' },
        { type:'line', label:'SLA %', data: dataMensual.sla, borderColor:'#2c3e50', backgroundColor:'#2c3e50', yAxisID:'y1', tension:.3 }
      ]
    },
    options:{
      responsive:true,
      interaction:{mode:'index', intersect:false},
      scales:{
        y:{ position:'left', title:{display:true, text:'#Shipment'} },
        y1:{ position:'right', grid:{drawOnChartArea:false}, title:{display:true, text:'SLA %'} }
      }
    }
  });
}catch(e){
  console.error("Error renderizando gráfico:", e);
  document.getElementById('chartMensual').insertAdjacentHTML('afterend', '<p style="color:#a31d1d;font-size:13px;">⚠️ No se pudo cargar el gráfico.</p>');
}

const WEBHOOK_URL = "https://TU-INSTANCIA-N8N.app.n8n.cloud/webhook/sla-chat";

async function enviarMensaje(){
  const input = document.getElementById("chatInput");
  const texto = input.value.trim();
  if(!texto) return;

  agregarMensaje(texto, "user");
  input.value = "";

  const typingEl = agregarTyping();

  try{
    const resp = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ pregunta: texto })
    });
    const data = await resp.json();
    typingEl.remove();
    agregarMensaje(data.respuesta || "No obtuve respuesta del servidor.", "bot");
  }catch(err){
    typingEl.remove();
    agregarMensaje("⚠️ No pude conectarme al chatbot todavía. Estamos configurando el flujo de n8n.", "bot");
  }
}

function agregarMensaje(texto, tipo){
  const cont = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = "msg " + tipo;
  div.textContent = texto;
  cont.appendChild(div);
  cont.scrollTop = cont.scrollHeight;
}

function agregarTyping(){
  const cont = document.getElementById("chatMessages");
  const div = document.createElement("div");
  div.className = "typing";
  div.textContent = "Escribiendo...";
  cont.appendChild(div);
  cont.scrollTop = cont.scrollHeight;
  return div;
}

document.getElementById("chatInput").addEventListener("keypress", function(e){
  if(e.key === "Enter") enviarMensaje();
});
</script>

</body>
</html>
