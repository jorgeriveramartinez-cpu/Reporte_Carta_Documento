<script>
const WEBHOOK_URL = "https://n8nappv2.ocasa.com:5688/webhook-test/sla-chat";

async function enviarMensaje(){
  const input = document.getElementById("chatInput");
  const texto = input.value.trim();
  if(!texto) return;

  agregarMensaje(texto, "user");
  input.value = "";

  const typingEl = agregarTyping();

  try{
    const resp = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ pregunta: texto })
    });

    const data = await resp.json();

    typingEl.remove();
    agregarMensaje(data.respuesta || "No obtuve respuesta del servidor.", "bot");

  }catch(err){
    typingEl.remove();
    agregarMensaje("⚠️ No pude conectarme al chatbot todavía. Estamos configurando el flujo de n8n.", "bot");
  }
}
</script>
